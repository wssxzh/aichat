name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Smoke test health endpoint
        run: |
          npm start > server.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/healthz > /dev/null; then
              echo "healthz ok"
              exit 0
            fi
            sleep 1
          done
          echo "healthz failed"
          cat server.log
          exit 1
